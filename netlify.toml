# Netlify Configuration for Webcam Capture

[build]
  # No build command needed - this is a static HTML site
  command = ""
  publish = "."

# Redirect all routes to webcam.html for single-page navigation
[[redirects]]
  from = "/*"
  to = "/webcam.html"
  status = 200

# Set cache headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; img-src 'self' data:"
